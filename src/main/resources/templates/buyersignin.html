<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Signin</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: #1f2937;
            background:
                linear-gradient(rgba(16, 24, 39, 0.58), rgba(16, 24, 39, 0.58)),
                url("https://images.unsplash.com/photo-1513001900722-370f803f498d?auto=format&fit=crop&w=1600&q=80");
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px 16px;
            overflow: hidden;
        }

        .signin-page {
            width: 100%;
            max-width: 900px;
            height: calc(100vh - 56px);
            max-height: calc(100vh - 56px);
            display: grid;
            grid-template-columns: 1fr 410px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 8px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
        }

        .brand-panel {
            min-height: 520px;
            padding: 46px;
            color: #ffffff;
            background:
                linear-gradient(rgba(28, 68, 77, 0.78), rgba(28, 68, 77, 0.78)),
                url("https://images.unsplash.com/photo-1481627834876-b7833e8f5570?auto=format&fit=crop&w=1000&q=80");
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .brand-name {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .brand-copy h2 {
            max-width: 390px;
            margin-bottom: 16px;
            font-size: clamp(2rem, 5vw, 3.3rem);
            line-height: 1.03;
            letter-spacing: 0;
        }

        .brand-copy p {
            max-width: 370px;
            font-size: 1rem;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.86);
        }

        .form-panel {
            padding: 42px 38px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-y: auto;
        }

        h1 {
            margin-bottom: 8px;
            font-size: 2rem;
            line-height: 1.2;
            color: #111827;
            letter-spacing: 0;
        }

        .subtitle {
            margin-bottom: 28px;
            color: #6b7280;
            line-height: 1.5;
            font-size: 0.96rem;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-size: 0.92rem;
            font-weight: 700;
            color: #374151;
        }
        .error-message {
            color: red;
            text-align: center;
            width: 100%;
            margin: 10px 0;
        }

        input {
            width: 100%;
            min-height: 46px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 11px 13px;
            font-size: 1rem;
            color: #111827;
            background: #ffffff;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            border-color: #0f766e;
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.14);
        }

        input[type="submit"] {
            min-height: 48px;
            margin-top: 8px;
            border: none;
            border-radius: 6px;
            background: #0f766e;
            color: #ffffff;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        input[type="submit"]:hover {
            background: #115e59;
            transform: translateY(-1px);
        }

        .signup-link {
            margin-top: 22px;
            text-align: center;
            color: #6b7280;
            font-size: 0.95rem;
        }

        .signup-link a {
            color: #0f766e;
            font-weight: 700;
            text-decoration: none;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }
        .success-message {
            color: rgb(143, 110, 110);
            text-align: center;
            width: 100%;
            margin: 10px 0;
        }
        @media (max-width: 800px) {
            .signin-page {
                max-width: 460px;
                grid-template-columns: 1fr;
            }

            .brand-panel {
                min-height: 230px;
                padding: 30px;
            }

            .brand-copy h2 {
                font-size: 2rem;
            }

            .brand-copy p {
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 16px 10px;
            }

            .signin-page {
                height: calc(100vh - 32px);
                max-height: calc(100vh - 32px);
                overflow-y: auto;
            }

            .brand-panel {
                min-height: 210px;
                padding: 24px;
            }

            .form-panel {
                padding: 30px 22px;
            }

            h1 {
                font-size: 1.72rem;
            }
        }
    </style>
</head>
<body>

    <main class="signin-page">
        <section class="brand-panel">
            <div class="brand-name">Book Rental System</div>

            <div class="brand-copy">
                <h2>Pick up where your reading paused.</h2>
                <p>Sign in to browse available rentals, manage your requests, and discover books nearby.</p>
            </div>
        </section>

        <section class="form-panel">
            <h1>Buyer Login</h1>
            <p class="subtitle">Enter your buyer account details to continue.</p>

            <form th:action="@{/buyersignin}" method="post">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <input type="submit" value="Login">
            </form>
            <p class="success-message" th:if="${buyeraddedsuccess}" th:text="${buyeraddedsuccess}"></p>
            <p class="error-message" th:if="${buyersigninerror}" th:text="${buyersigninerror}"></p>
            <p class="signup-link">
                New User?
                <a th:href="@{/buyersignup}">Signup Here</a>
            </p>
        </section>
    </main>

</body>
</html>
