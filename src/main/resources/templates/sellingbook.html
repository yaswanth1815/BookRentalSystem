<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage Books - Sell a Book</title>
    <style>
        /* ==========================================================================
           GLOBAL BASE STYLES (Shared Dashboard Architecture)
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Prevent full-page scrolling to maintain application shell integrity */
        body, html {
            height: 100vh;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            background: #0b0f19;
        }

        /* Main viewport wrapper locked to 100vh with rich overlay background */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background:
                linear-gradient(rgba(11, 15, 25, 0.8), rgba(11, 15, 25, 0.9)),
                url("https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=1920&auto=format&fit=crop");
            background-size: cover;
            background-position: center;
        }

        /* Single, unified app frame with deep premium dark-blue gradient */
        .page-box {
            width: 100%;
            max-width: 1140px;
            height: calc(100vh - 32px);
            max-height: calc(100vh - 32px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: linear-gradient(145deg, #131a2c, #1a233d);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
        }

        /* Universal Top Navbar Layout */
        nav {
            background: #0d1220;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        nav ul {
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(14px, 3vw, 40px);
            list-style: none;
            padding: 10px 22px;
            flex-wrap: wrap;
        }

        nav a {
            color: #94a3b8;
            font-size: 0.88rem;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: #38bdf8; /* Bright Blue Accent */
        }

        /* Base Scrollable Content Panel */
        .content-scroller {
            flex-grow: 1;
            overflow-y: auto;
            padding: clamp(24px, 5vw, 44px) clamp(16px, 3vw, 28px);
        }

        /* Custom Scrollbars for smooth dark theme aesthetics */
        .content-scroller::-webkit-scrollbar {
            width: 8px;
        }
        .content-scroller::-webkit-scrollbar-track {
            background: #151d30;
        }
        .content-scroller::-webkit-scrollbar-thumb {
            background: #293754;
            border-radius: 4px;
        }
        .content-scroller::-webkit-scrollbar-thumb:hover {
            background: #38bdf8;
        }

        /* ==========================================================================
           FORM DASHBOARD COMPONENTS
           ========================================================================== */
        .form-card {
            max-width: 540px;
            margin: 0 auto;
            padding: clamp(22px, 5vw, 36px);
            border-radius: 10px;
            background: #151d30;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
        }

        .form-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .form-header h1 {
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            color: #ffffff;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .form-header .lead {
            color: #94a3b8;
            font-size: 0.98rem;
            line-height: 1.5;
        }

        .form-row {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            min-height: 44px;
            border: 1px solid #293754;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 0.95rem;
            background: #0d1220;
            color: #ffffff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        /* Focus states for input fields */
        input:focus,
        select:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }

        /* Custom style overrides for option dropdowns */
        select option {
            background: #151d30;
            color: #ffffff;
        }

        input[type="submit"] {
            display: block;
            width: 100%;
            border: none;
            border-radius: 6px;
            padding: 14px 18px;
            background: #10b981; /* Premium Emerald Emerald */
            color: #ffffff;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            margin-top: 28px;
            transition: background 0.2s, transform 0.1s;
        }

        input[type="submit"]:hover {
            background: #059669;
        }

        input[type="submit"]:active {
            transform: scale(0.99);
        }

        /* ==========================================================================
           RESPONSIVE BREAKPOINTS
           ========================================================================== */
        @media (max-width: 720px) {
            body {
                padding: 8px;
            }

            .page-box {
                height: calc(100vh - 16px);
                max-height: calc(100vh - 16px);
            }

            nav ul {
                justify-content: flex-start;
                flex-wrap: nowrap;
                overflow-x: auto;
            }

            nav a {
                white-space: nowrap;
            }

            .content-scroller {
                padding: 24px 14px;
            }
        }
    </style>
</head>
<body>

    <main class="page-box">
        <!-- Navigation Bar -->
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="sellingbook.html">Sell a Book</a></li>
                <li><a href="contactus.html">Contact Us</a></li>
                <li><a href="orders.html">Orders</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
        </nav>

        <!-- Dynamic Dashboard Container Viewport -->
        <div class="content-scroller">
            
            <form class="form-card" method="post" action="sellingbook.html">
                
                <div class="form-header">
                    <h1>Enter Book Details</h1>
                    <p class="lead">Add the book information that buyers will see.</p>
                </div>
                
                <div class="form-row">
                    <label for="bookname">Name of the book</label>
                    <input type="text" id="bookname" name="bookname" required autocomplete="off">
                </div>
                
                <div class="form-row">
                    <label for="author">Author</label>
                    <input type="text" id="author" name="author" required autocomplete="off">
                </div>
                
                <div class="form-row">
                    <label for="pages">Pages</label>
                    <input type="number" id="pages" name="pages" min="1" required>
                </div>
                
                <div class="form-row">
                    <label for="price">Price</label>
                    <input type="number" id="price" name="price" min="0" step="0.01" required>
                </div>
                
                <div class="form-row">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" name="quantity" min="1" required>
                </div>
                
                <div class="form-row">
                    <label for="select">Listing Type</label>
                    <select id="select" name="select">
                        <option value="Sell">Selling</option>
                        <option value="Donation">Donate</option>
                    </select>
                </div>
                
                <input type="submit" name="submit" value="Submit Details">
            </form>
            
        </div>
    </main>

</body>
</html>
