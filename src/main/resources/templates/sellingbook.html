<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Desk - Sell a Book</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }

        body {
            overflow: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page-shell {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(10px, 2vw, 22px);
            background:
                radial-gradient(circle at 18% 10%, rgba(94, 234, 212, 0.35), transparent 34%),
                linear-gradient(135deg, #0f172a, #3a2e5d 58%, #7f3f36);
            position: relative; /* Context anchor for the floating notification */
        }

        .page-box {
            width: min(1360px, 100%);
            height: calc(100vh - clamp(20px, 4vw, 44px));
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 20px;
            background: rgba(15, 23, 42, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(18px);
        }

        nav {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 14px clamp(18px, 3vw, 30px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.13);
        }

        .brand {
            white-space: nowrap;
            font-size: 0.82rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        nav ul {
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: clamp(10px, 2.2vw, 28px);
            list-style: none;
        }

        nav a {
            white-space: nowrap;
            color: #c4d3e7;
            font-size: clamp(0.68rem, 0.95vw, 0.8rem);
            font-weight: 800;
            text-transform: uppercase;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: #5eead4;
        }

        .content {
            flex: 1 1 auto;
            min-height: 0;
            display: grid;
            grid-template-columns: minmax(240px, 0.4fr) minmax(0, 1.6fr);
            gap: clamp(16px, 3vw, 36px);
            padding: clamp(16px, 3.5vw, 44px);
            overflow: hidden;
        }

        .side-intro {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 14px;
        }

        .kicker {
            color: #5eead4;
            font-size: 0.74rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.14em;
        }

        .side-intro h1 {
            color: #f8fafc;
            font-size: clamp(2rem, 3.5vw, 3.2rem);
            line-height: 1.05;
        }

        .side-intro .lead {
            color: #c4d3e7;
            font-size: clamp(0.85rem, 1.1vw, 1rem);
            line-height: 1.5;
            max-width: 320px;
        }

        .form-wrap {
            min-height: 0;
            width: 100%;
            overflow-y: auto;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 10px;
            scrollbar-width: thin;
            scrollbar-color: rgba(94, 234, 212, 0.4) rgba(255, 255, 255, 0.05);
        }

        .form-wrap::-webkit-scrollbar {
            width: 6px;
        }
        .form-wrap::-webkit-scrollbar-thumb {
            background: rgba(94, 234, 212, 0.4);
            border-radius: 999px;
        }

        .form-grid-card {
            width: 100%;
            max-width: 680px;
            background: rgba(8, 13, 26, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: clamp(20px, 3vw, 32px);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .form-row {
            display: flex;
            flex-direction: column;
        }

        .form-row.full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            margin-bottom: 7px;
            color: #c4d3e7;
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            min-height: 44px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.88rem;
            background: rgba(15, 23, 42, 0.6);
            color: #f8fafc;
            transition: all 0.2s ease;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #5eead4;
            background: rgba(15, 23, 42, 0.83);
            box-shadow: 0 0 0 3px rgba(94, 234, 212, 0.15);
        }

        select option {
            background: #0f172a;
            color: #f8fafc;
        }

        .action-row {
            grid-column: span 2;
            margin-top: 12px;
        }

        input[type="submit"] {
            display: block;
            width: 100%;
            min-height: 46px;
            border: none;
            border-radius: 8px;
            padding: 12px 18px;
            background: #5eead4;
            color: #06201c;
            font-weight: 900;
            font-size: 0.86rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(94, 234, 212, 0.15);
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        input[type="submit"]:hover {
            transform: translateY(-1px);
            filter: brightness(1.08);
        }

        input[type="submit"]:active {
            transform: scale(0.99);
        }

        /* ──── FLOATING TOAST NOTIFICATION STYLING ──── */
        .book-added-message {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            min-width: 320px;
            max-width: 480px;
            color: #06201c;
            background: #5eead4;
            border-radius: 10px;
            padding: 16px 22px;
            font-size: 0.9rem;
            font-weight: 700;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(94, 234, 212, 0.2);
            
            /* Entry Animation: Drops into view and stabilizes */
            animation: toastDropIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        @keyframes toastDropIn {
            from {
                transform: translateY(-24px) scale(0.92);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        /* Smooth dissolution transition applied via JS before removal */
        .toast-leave {
            opacity: 0 !important;
            transform: translateY(-12px) scale(0.95) !important;
        }

        /* RESPONSIVE DESIGN BREAKPOINTS */
        @media (max-width: 860px) {
            body {
                overflow-y: auto;
            }
            .page-shell {
                height: auto;
                min-height: 100vh;
            }
            .page-box {
                height: auto;
                min-height: calc(100vh - 20px);
            }
            nav {
                flex-direction: column;
                align-items: flex-start;
            }
            nav ul {
                width: 100%;
                flex-wrap: wrap;
                justify-content: flex-start;
            }
            .content {
                grid-template-columns: 1fr;
                gap: 24px;
                padding: 24px 16px;
            }
            .side-intro {
                text-align: center;
                align-items: center;
            }
            .side-intro .lead {
                max-width: 100%;
            }
            /* Pin to screen bottom on tiny interfaces for enhanced reach */
            .book-added-message {
                top: auto;
                bottom: 24px;
                right: 16px;
                left: 16px;
                min-width: 0;
                text-align: center;
                animation: toastRiseUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
            }
        }

        @keyframes toastRiseUp {
            from { transform: translateY(24px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 520px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-row, .form-row.full-width, .action-row {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="page-shell">
        
        <div id="successToast" class="book-added-message" th:if="${bookAddedMessage}">
            ✨ <span th:text="${bookAddedMessage}">Book listing submitted!</span>
        </div>

        <main class="page-box">
            <nav>
                <div class="brand">Seller Desk</div>
                <ul>
                    <li><a th:href="@{/sellerhomepage}">Home</a></li>
                    <li><a th:href="@{/sellingabook}">Sell a Book</a></li>
                    <li><a th:href="@{/sellercontactus}">Contact Us</a></li>
                    <li><a th:href="@{/sellerorders}">Orders</a></li>
                    <li><a th:href="@{/sellerprofile}">Profile</a></li>
                </ul>
            </nav>

            <div class="content">
                <aside class="side-intro">
                    <p class="kicker">Marketplace</p>
                    <h1>Sell a Book</h1>
                    <p class="lead">List your textbook or novel with clear details to find active buyers instantly.</p>
                </aside>

                <div class="form-wrap">
                    <form class="form-grid-card" method="post" th:action="@{/sellingbook}">
                        <div class="form-grid">
                            
                            <div class="form-row full-width">
                                <label for="bookname">Name of the book</label>
                                <input type="text" id="bookname" name="bookname" required autocomplete="off">
                            </div>
                            
                            <div class="form-row full-width">
                                <label for="author">Author</label>
                                <input type="text" id="author" name="author" required autocomplete="off">
                            </div>
                            
                            <div class="form-row">
                                <label for="pages">Pages</label>
                                <input type="number" id="pages" name="pages" min="1" required>
                            </div>
                            
                            <div class="form-row">
                                <label for="price">Price</label>
                                <input type="number" id="price" name="price" min="0" step="0.01" required>
                            </div>
                            
                            <div class="form-row">
                                <label for="quantity">Quantity</label>
                                <input type="number" id="quantity" name="quantity" min="1" required>
                            </div>
                            
                            <div class="form-row">
                                <label for="select">Listing Type</label>
                                <select id="select" name="saletype">
                                    <option value="Sell">Selling</option>
                                    <option value="Donation">Donate</option>
                                </select>
                            </div>
                            
                            <div class="action-row">
                                <input type="submit" name="submit" value="Submit Details">
                            </div>
                            
                        </div>
                    </form>
                </div>
                
            </div>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const toastElement = document.getElementById("successToast");
            
            if (toastElement) {
                // At 4.6 seconds, add the fading class to kick off the 400ms CSS slide/opacity transition
                setTimeout(() => {
                    toastElement.classList.add("toast-leave");
                }, 4600);

                // At exactly 5 seconds, remove the element completely from the DOM tree
                setTimeout(() => {
                    toastElement.remove();
                }, 5000);
            }
        });
    </script>

</body>
</html>
