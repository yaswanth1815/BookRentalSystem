<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Desk - Sell a Book</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }

        body {
            overflow: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page-shell {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(10px, 2vw, 22px);
            background:
                radial-gradient(circle at 18% 10%, rgba(94, 234, 212, 0.35), transparent 34%),
                linear-gradient(135deg, #0f172a, #3a2e5d 58%, #7f3f36);
        }

        .page-box {
            width: min(1360px, 100%);
            height: calc(100vh - clamp(20px, 4vw, 44px));
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 20px;
            background: rgba(15, 23, 42, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(18px);
        }

        nav {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 14px clamp(18px, 3vw, 30px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.13);
        }

        .brand {
            white-space: nowrap;
            font-size: 0.82rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        nav ul {
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: clamp(10px, 2.2vw, 28px);
            list-style: none;
        }

        nav a {
            white-space: nowrap;
            color: #c4d3e7;
            font-size: clamp(0.68rem, 0.95vw, 0.8rem);
            font-weight: 800;
            text-transform: uppercase;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: #5eead4;
        }

        /* Form Page Layout Adjustments */
        .content {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: clamp(16px, 2.7vw, 32px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(94, 234, 212, 0.62) rgba(255, 255, 255, 0.08);
        }

        .content::-webkit-scrollbar {
            width: 8px;
        }

        .content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.08);
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(94, 234, 212, 0.62);
            border-radius: 999px;
        }

        .form-card {
            width: 100%;
            max-width: 560px;
            margin: auto 0;
            padding: clamp(20px, 4vw, 36px);
            border-radius: 12px;
            background: rgba(8, 13, 26, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(18px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
        }

        .form-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .form-header h1 {
            color: #f8fafc;
            font-size: clamp(1.6rem, 3vw, 2.2rem);
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .form-header .lead {
            color: #c4d3e7;
            font-size: clamp(0.84rem, 1vw, 0.95rem);
            line-height: 1.5;
        }

        .form-row {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            color: #5eead4; /* Teal accents for labels */
            font-size: 0.74rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            min-height: 44px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 7px;
            padding: 10px 14px;
            font-size: 0.88rem;
            background: rgba(15, 23, 42, 0.7);
            color: #f8fafc;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #5eead4;
            box-shadow: 0 0 0 3px rgba(94, 234, 212, 0.18);
        }

        select option {
            background: #0f172a;
            color: #f8fafc;
        }

        input[type="submit"] {
            display: block;
            width: 100%;
            min-height: 46px;
            border: none;
            border-radius: 7px;
            padding: 12px 18px;
            background: #5eead4; /* Signature Teal color for submit */
            color: #06201c;
            font-weight: 900;
            font-size: 0.88rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            margin-top: 28px;
            box-shadow: 0 10px 24px rgba(94, 234, 212, 0.15);
            transition: transform 0.2s ease, filter 0.2s ease;
        }
        .book-added-message {
            color: rgb(143, 110, 110);
            text-align: center;
            width: 100%;
            margin: 10px 0;
        }

        input[type="submit"]:hover {
            transform: translateY(-1px);
            filter: brightness(1.08);
        }

        input[type="submit"]:active {
            transform: scale(0.99);
        }

        /* Responsive Breakpoints */
        @media (max-width: 980px) {
            .page-shell {
                height: 100vh;
            }

            .page-box {
                height: calc(100vh - 20px);
            }

            nav {
                align-items: flex-start;
                flex-direction: column;
            }

            nav ul {
                width: 100%;
                flex-wrap: wrap;
                justify-content: flex-start;
            }

            .content {
                padding: 24px 14px;
            }
            
            .form-card {
                margin: 0 auto;
            }
        }

        @media (max-width: 520px) {
            .page-shell {
                padding: 8px;
            }

            .page-box {
                border-radius: 14px;
            }

            .content {
                padding: 16px 12px;
            }
        }
    </style>
</head>
<body>

    <div class="page-shell">
        <main class="page-box">
            <nav>
                <div class="brand">Seller Desk</div>
                <ul>
                    <li><a th:href="@{/sellerhomepage}">Home</a></li>
                    <li><a th:href="@{/sellingabook}">Sell a Book</a></li>
                    <li><a th:href="@{/sellercontactus}">Contact Us</a></li>
                    <li><a th:href="@{/sellerorders}">Orders</a></li>
                    <li><a th:href="@{/sellerprofile}">Profile</a></li>
                </ul>
            </nav>

            <div class="content">
                
                <form class="form-card" method="post" th:action="@{/sellingbook}">
                    
                    <div class="form-header">
                        <h1>Enter Book Details</h1>
                        <p class="lead">Add the book information that buyers will see.</p>
                    </div>
                    
                    <div class="form-row">
                        <label for="bookname">Name of the book</label>
                        <input type="text" id="bookname" name="bookname" required autocomplete="off">
                    </div>
                    
                    <div class="form-row">
                        <label for="author">Author</label>
                        <input type="text" id="author" name="author" required autocomplete="off">
                    </div>
                    
                    <div class="form-row">
                        <label for="pages">Pages</label>
                        <input type="number" id="pages" name="pages" min="1" required>
                    </div>
                    
                    <div class="form-row">
                        <label for="price">Price</label>
                        <input type="number" id="price" name="price" min="0" step="0.01" required>
                    </div>
                    
                    <div class="form-row">
                        <label for="quantity">Quantity</label>
                        <input type="number" id="quantity" name="quantity" min="1" required>
                    </div>
                    
                    <div class="form-row">
                        <label for="select">Listing Type</label>
                        <select id="select" name="saletype">
                            <option value="Sell">Selling</option>
                            <option value="Donation">Donate</option>
                        </select>
                    </div>
                    
                    <input type="submit" name="submit" value="Submit Details">
                </form>
                <p class="book-added-message" th:if="${bookAddedMessage}" th:text="${bookAddedMessage}"></p>
                
            </div>
        </main>
    </div>

</body>
</html>
