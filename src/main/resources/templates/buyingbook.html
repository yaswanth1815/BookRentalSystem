<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy a Book</title>
    <style>
        /* ==========================================================================
           GLOBAL BASE STYLES (Identical framework matching the Cart page layout)
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            background: #0b0f19;
            -webkit-font-smoothing: antialiased;
        }

        .page-shell {
            height: 100vh;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                linear-gradient(rgba(11, 15, 25, 0.82), rgba(11, 15, 25, 0.92)),
                url("https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=1920&auto=format&fit=crop");
            background-size: cover;
            background-position: center;
        }

        .page-box {
            width: min(1140px, 100%);
            height: calc(100vh - 32px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: linear-gradient(145deg, #131a2c, #1a233d);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            box-shadow: 0 32px 64px -12px rgba(0, 0, 0, 0.8);
        }

        /* Universal Top Navbar */
        nav {
            background: #0d1220;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
        }

        nav ul {
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(14px, 3vw, 40px);
            list-style: none;
            padding: 10px 22px;
            flex-wrap: wrap;
        }

        nav a {
            color: #94a3b8;
            font-size: 0.88rem;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
        }

        nav a:hover {
            color: #38bdf8;
        }

        /* Base Content Container */
        .content {
            padding: 12px clamp(24px, 4vw, 40px) 40px clamp(24px, 4vw, 40px);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content h1 {
            margin-bottom: 1px;
            font-size: clamp(2.2rem, 4.5vw, 2.6rem);
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        .lead-text {
            color: #94a3b8;
            font-size: 0.98rem;
            margin-bottom: 4px;
            line-height: 1.6;
        }

        /* Custom Scrollbars for the Grid */
        .grid-wrap::-webkit-scrollbar {
            width: 8px;
        }
        .grid-wrap::-webkit-scrollbar-track {
            background: transparent;
        }
        .grid-wrap::-webkit-scrollbar-thumb {
            background: #22304e;
            border-radius: 99px;
        }
        .grid-wrap::-webkit-scrollbar-thumb:hover {
            background: #38bdf8;
        }

        @media (max-width: 720px) {
            .page-shell { padding: 8px; }
            .page-box { height: calc(100vh - 16px); }
            nav ul { justify-content: flex-start; flex-wrap: nowrap; overflow-x: auto; padding: 12px; }
            nav a { white-space: nowrap; }
            .content { padding: 20px 16px; }
        }

        /* ==========================================================================
           CARD GRID SPECIFIC DESIGN
           ========================================================================== */
        .grid-wrap {
            width: 100%;
            margin-top: 24px;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 4px;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        /* Modern dashboard block layout */
        .book-card {
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            transition: all 0.2s ease;
        }

        .book-card:hover {
            border-color: rgba(56, 189, 248, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.5);
        }

        /* Header logic of card */
        .book-title {
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 4px;
        }

        .book-author {
            color: #94a3b8;
            font-size: 0.88rem;
            margin-bottom: 16px;
        }

        /* Central descriptive details grid (Modified to 4 slots) */
        .book-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 12px;
            margin-bottom: 16px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            margin-bottom: 2px;
        }

        .detail-value {
            font-size: 0.88rem;
            color: #cbd5e1;
            font-weight: 500;
        }

        /* Highlight types explicitly */
        .type-badge {
            color: #a78bfa !important; /* Rich Lavender */
            font-weight: 700;
        }

        .price-badge {
            color: #fbbf24 !important; /* Rich Gold */
            font-weight: 700;
        }

        /* Bottom operational structure */
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 14px;
            margin-top: auto;
            gap: 10px;
        }

        .redirected-message {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #f43f5e; /* Vibrant Rose / Coral Alert */
    
    /* Strict Single Line Management */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    
    /* Clean Pill Container */
    background: rgba(244, 63, 94, 0.08);
    border: 1px solid rgba(244, 63, 94, 0.15);
    padding: 6px 10px;
    border-radius: 20px; /* Perfect pill shape */
    
    /* Layout Positioning */
    flex-grow: 1;
    max-width: 130px; /* Adjust this to fit your exact card width perfectly */
    margin-right: 8px;
    
    /* Entrance Animation */
    animation: popIn 0.25s ease-out;
}

/* Creating a live blinking status dot on the left side of the text */
    .redirected-message::before {
        content: '';
        display: inline-block;
        width: 6px;
        height: 6px;
        background-color: #f43f5e;
        border-radius: 50%;
        flex-shrink: 0;
        box-shadow: 0 0 8px #f43f5e;
    }

    @keyframes popIn {
        from {
            opacity: 0;
            transform: scale(0.92);
        }
        to {
            opacity: 1;
            transform: scale(1);
        }
    }

        .btn-cart {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 34px;
            padding: 0 14px;
            background: #10b981; /* Emerald Green */
            color: #ffffff;
            font-size: 0.8rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-cart:hover {
            background: #059669;
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <main class="page-box">
            
            <nav>
                <ul>
                    <li><a th:href="@{/buyershome}">Home</a></li>
                    <li><a th:href="@{/buyingbook}">Buy a Book</a></li>
                    <li><a th:href="@{/buyersvintagebooks}">Vintage Books</a></li>
                    <li><a th:href="@{/buyerscontactus}">Contact Us</a></li>
                    <li><a th:href="@{/buyerscartshow}">Cart</a></li>
                    <li><a th:href="@{/buyersprofile}">Profile</a></li>
                </ul>
            </nav>

            <section class="content">
                <h1>Available Books</h1>
                <p class="lead-text">Hello, buyer. Browse books currently available for purchase, rent, or donation.</p>
                
                <div class="grid-wrap">
                    <div class="books-grid">
                        
                        <div class="book-card" th:each="book : ${booklist}">
                            <div>
                                <div class="book-title" th:text="${book.bookname}">Book Title</div>
                                <div class="book-author" th:text="${book.author}">Author Name</div>
                                
                                <div class="book-details">
                                    <div class="detail-item">
                                        <span class="detail-label">Pages</span>
                                        <span class="detail-value" th:text="${book.pages}">0</span>
                                    </div>
                                    <div class="detail-item">
                                        <span class="detail-label">Type</span>
                                        <span class="detail-value type-badge" th:text="${book.saletype}">Buy</span>
                                    </div>
                                    <div class="detail-item">
                                        <span class="detail-label">Stock Left</span>
                                        <span class="detail-value" th:text="${book.quantity}">0</span>
                                    </div>
                                    <div class="detail-item">
                                        <span class="detail-label">Price</span>
                                        <span class="detail-value price-badge" th:text="${book.price + ' /-'}">0 /-</span>
                                    </div>
                                </div>
                            </div>

                            <div class="card-footer">
                                <p class="redirected-message" th:if="${messagebookid==book.id}" th:text="${redirectedmessage}"></p>
                                <div th:if="${messagebookid!=book.id}" style="flex-grow: 1;"></div> 
                                <form method="post" th:action="@{/buyerscart}">
                                    <input type="hidden" name="bookid" th:value="${book.id}">
                                    <button class="btn-cart" type="submit">Add to Cart</button>
                                </form>
                            </div>
                        </div>

                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
