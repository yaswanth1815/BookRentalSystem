<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Cart</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Prevent full-page scrolling */
        body, html {
            height: 100vh;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            background: #0b0f19;
        }

        /* Main viewport wrapper locked to 100vh */
        .page-shell {
            height: 100vh;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                linear-gradient(rgba(11, 15, 25, 0.8), rgba(11, 15, 25, 0.9)),
                url("https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=1920&auto=format&fit=crop");
            background-size: cover;
            background-position: center;
        }

        /* Single, flat container with vibrant dark-blue gradient */
        .page-box {
            width: min(1140px, 100%);
            height: calc(100vh - 32px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: linear-gradient(145deg, #131a2c, #1a233d);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
        }

        nav {
            background: #0d1220;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
        }

        nav ul {
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(14px, 3vw, 40px);
            list-style: none;
            padding: 10px 22px;
            flex-wrap: wrap;
        }

        nav a {
            color: #94a3b8;
            font-size: 0.88rem;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: #38bdf8; /* Bright Blue Accent */
        }

        /* Content elements flow cleanly inside this layout */
        .content {
            padding: clamp(20px, 4vw, 36px);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Side-by-side header row container */
        .cart-header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .cart-header-area h1 {
            font-size: clamp(2rem, 5vw, 2.8rem);
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .cart-count {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border-radius: 999px;
            background: rgba(35, 45, 69, 0.6);
            backdrop-filter: blur(4px);
            color: #cbd5e1;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .cart-count strong {
            min-width: 26px;
            min-height: 26px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #10b981; /* Vibrant Emerald */
            color: #ffffff;
            font-size: 0.85rem;
            padding: 2px;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.4);
        }

        /* Table container handles internal scrolling and size targets */
        .table-wrap {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            background: #151d30;
            overflow: auto; 
            flex-grow: 1;
            min-height: 480px; /* Forces container to stay tall enough to show ~5 books clearly */
            box-shadow: inset 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        table {
            width: 100%;
            min-width: 900px;
            border-collapse: collapse;
        }

        /* Sticky table headers */
        th {
            position: sticky;
            top: 0;
            background: #0f1626;
            color: #fbbf24; /* Rich Gold */
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            z-index: 1;
            box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.08);
        }

        th, td {
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 18px 16px;
            text-align: left;
            vertical-align: middle;
        }

        /* Center alignment overrides */
        th.center-align, td.center-align {
            text-align: center;
        }

        /* Right alignment overrides */
        th.right-align, td.right-align {
            text-align: right;
        }

        td {
            color: #e2e8f0;
            font-size: 0.92rem;
        }

        tbody tr {
            transition: background 0.15s ease;
        }

        tbody tr:hover {
            background: rgba(30, 39, 59, 0.6);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* Book Title Column */
        td.book-title {
            color: #ffffff;
            font-weight: 700;
            letter-spacing: -0.2px;
        }

        /* Dynamic Status Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge.type-rent {
            background: rgba(167, 139, 250, 0.15);
            color: #c084fc;
            border: 1px solid rgba(167, 139, 250, 0.25);
        }
        .badge.type-buy {
            background: rgba(56, 189, 248, 0.15);
            color: #38bdf8;
            border: 1px solid rgba(56, 189, 248, 0.25);
        }

        /* Action Buttons styling setup */
        td.actions-cell {
            width: 110px;
        }

        td a.btn-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 36px;
            border-radius: 6px;
            padding: 0 14px;
            color: #ffffff;
            font-size: 0.82rem;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 0.3px;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.2s ease, box-shadow 0.2s ease;
        }

        td.action-remove a.btn-action {
            background: #f43f5e; /* Rose Crimson */
            box-shadow: 0 4px 12px rgba(244, 63, 94, 0.2);
        }

        td.action-checkout a.btn-action {
            background: #10b981; /* Emerald */
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        td a.btn-action:hover {
            transform: translateY(-2px);
            filter: brightness(1.15);
        }
        
        td.action-remove a.btn-action:hover {
            box-shadow: 0 6px 16px rgba(244, 63, 94, 0.4);
        }
        
        td.action-checkout a.btn-action:hover {
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
        }

        /* Custom Scrollbar */
        .table-wrap::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .table-wrap::-webkit-scrollbar-track {
            background: #151d30;
        }
        .table-wrap::-webkit-scrollbar-thumb {
            background: #293754;
            border-radius: 4px;
        }
        .table-wrap::-webkit-scrollbar-thumb:hover {
            background: #38bdf8;
        }

        @media (max-width: 720px) {
            .page-shell {
                padding: 8px;
            }

            .page-box {
                height: calc(100vh - 16px);
            }

            nav ul {
                justify-content: flex-start;
                flex-wrap: nowrap;
                overflow-x: auto;
                padding-bottom: 12px;
            }

            nav a {
                white-space: nowrap;
            }

            .content {
                padding: 16px 12px;
            }

            .cart-header-area {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .cart-count {
                width: 100%;
                justify-content: space-between;
                border-radius: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <main class="page-box">
            <nav>
                <ul>
                    <li><a th:href="@{/buyershome}">Home</a></li>
                    <li><a th:href="@{/buyingbook}">Buy a Book</a></li>
                    <li><a th:href="@{/buyersvintagebooks}">Vintage Books</a></li>
                    <li><a th:href="@{/buyerscontactus}">Contact Us</a></li>
                    <li><a th:href="@{/buyerscartshow}">Cart</a></li>
                    <li><a th:href="@{/buyersprofile}">Profile</a></li>
                </ul>
            </nav>

            <section class="content">
                <div class="cart-header-area">
                    <h1>Your Cart</h1>
                    <p class="cart-count">
                        Number of books you have added to cart: 
                        <strong th:text="${buyerCartList != null ? buyerCartList.size() : 0}">2</strong>
                    </p>
                </div>

                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 30%;">Book Name</th>
                                <th style="width: 22%;">Author</th>
                                <th class="center-align" style="width: 10%;">Pages</th>
                                <th class="right-align" style="width: 12%;">Price</th>
                                <th class="center-align" style="width: 12%;">Type</th>
                                <th class="center-align" style="width: 10%;">Qty</th>
                                <th class="center-align" style="width: 12%;">Manage</th>
                                <th class="center-align" style="width: 12%;">Checkout</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(buyerCartList)}">
                                <td colspan="8" class="center-align" style="color: #64748b; padding: 60px 0; font-style: italic;">
                                    Your literary cart is currently empty.
                                </td>
                            </tr>
                            
                            <tr th:each="cart : ${buyerCartList}">
                                <td class="book-title" th:text="${cart.sellerbooks.bookname}"></td>
                                <td th:text="${cart.sellerbooks.author}" style="color: #cbd5e1;"></td>
                                <td class="center-align" th:text="${cart.sellerbooks.pages}"></td>
                                <td class="right-align" th:text="${'$' + #numbers.formatDecimal(cart.sellerbooks.price, 1, 2)}"></td>
                                <td class="center-align">
                                    <span th:class="${#strings.toLowerCase(cart.sellerbooks.saletype) == 'rent' || #strings.toLowerCase(cart.sellerbooks.saletype) == 'rental' ? 'badge type-rent' : 'badge type-buy'}" 
                                          th:text="${cart.sellerbooks.saletype}">
                                    </span>
                                </td>
                                <td class="center-align" th:text="${cart.quantity}" style="font-weight: 700;"></td>
                                <td class="center-align actions-cell action-remove">
                                    <a th:href="@{/cart/remove(id=${cart.id})}" class="btn-action">Remove</a>
                                </td>
                                <td class="center-align actions-cell action-checkout">
                                    <a th:href="@{/cart/checkout(id=${cart.id})}" class="btn-action">Buy Now</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
