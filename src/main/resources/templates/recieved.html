<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage Books - Order Delivered</title>
    <style>
        /* ==========================================================================
           GLOBAL BASE STYLES (Shared Dashboard Architecture)
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Prevent full-page scrolling to maintain application shell integrity */
        body, html {
            height: 100vh;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            background: #0b0f19;
        }

        /* Main viewport wrapper locked to 100vh with rich overlay background */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background:
                linear-gradient(rgba(11, 15, 25, 0.8), rgba(11, 15, 25, 0.9)),
                url("https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=1920&auto=format&fit=crop");
            background-size: cover;
            background-position: center;
        }

        /* Single, unified app frame with deep premium dark-blue gradient */
        .page-box {
            width: 100%;
            max-width: 1140px;
            height: calc(100vh - 32px);
            max-height: calc(100vh - 32px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: linear-gradient(145deg, #131a2c, #1a233d);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
        }

        /* Universal Top Navbar Layout */
        nav {
            background: #0d1220;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        nav ul {
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(14px, 3vw, 40px);
            list-style: none;
            padding: 10px 22px;
            flex-wrap: wrap;
        }

        nav a {
            color: #94a3b8;
            font-size: 0.88rem;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: #38bdf8; /* Bright Blue Accent */
        }

        /* Base Scrollable Content Panel */
        .content-scroller {
            flex-grow: 1;
            overflow-y: auto;
            padding: clamp(20px, 4vw, 36px) clamp(16px, 3vw, 28px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Custom Scrollbars for smooth dark theme aesthetics */
        .content-scroller::-webkit-scrollbar {
            width: 8px;
        }
        .content-scroller::-webkit-scrollbar-track {
            background: #151d30;
        }
        .content-scroller::-webkit-scrollbar-thumb {
            background: #293754;
            border-radius: 4px;
        }
        .content-scroller::-webkit-scrollbar-thumb:hover {
            background: #38bdf8;
        }

        /* ==========================================================================
           SUCCESS / MESSAGE CARD COMPONENTS
           ========================================================================== */
        .confirmation-card {
            width: min(500px, 100%);
            padding: clamp(24px, 5vw, 40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            background: #151d30;
            text-align: center;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
        }

        /* Success Icon Wrapper styling */
        .icon-wrap {
            margin-bottom: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .icon-wrap svg {
            width: 32px;
            height: 32px;
            fill: #10b981; /* Emerald Green Success */
        }

        .confirmation-card h1 {
            color: #ffffff;
            font-size: clamp(1.5rem, 4vw, 2.1rem);
            font-weight: 800;
            margin-bottom: 12px;
        }

        .confirmation-card p {
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        /* Global UI Buttons inside the new panel structure */
        .button {
            display: inline-block;
            border: none;
            border-radius: 6px;
            padding: 12px 24px;
            background: #10b981; /* Premium Emerald */
            color: #ffffff;
            font-weight: 700;
            text-decoration: none;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .button:hover {
            background: #059669;
        }

        .button:active {
            transform: scale(0.98);
        }

        /* ==========================================================================
           RESPONSIVE BREAKPOINTS
           ========================================================================== */
        @media (max-width: 720px) {
            body {
                padding: 8px;
            }

            .page-box {
                height: calc(100vh - 16px);
                max-height: calc(100vh - 16px);
            }

            nav ul {
                justify-content: flex-start;
                flex-wrap: nowrap;
                overflow-x: auto;
            }

            nav a {
                white-space: nowrap;
            }

            .content-scroller {
                padding: 24px 14px;
            }

            .confirmation-card {
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>

    <main class="page-box">
        <nav>
            <ul>
                <li><a href="orders.html">Back to Orders</a></li>
                <li><a href="home.html">Home</a></li>
            </ul>
        </nav>

        <div class="content-scroller">
            
            <section class="confirmation-card">
                <div class="icon-wrap">
                    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                </div>
                
                <h1>Order Delivered</h1>
                <p>The selected order has been marked as delivered. In the PHP version, this page updated the database and redirected to orders.</p>
                
                <a class="button" href="orders.html">Go to Orders</a>
            </section>
            
        </div>
    </main>

</body>
</html>
