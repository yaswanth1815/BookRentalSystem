<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Desk - Contact Us</title>
    <style>
        /* ==========================================================================
           GLOBAL BASE STYLES (Shared Glassmorphic Layout Structure)
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }

        body {
            overflow: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page-shell {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(10px, 2vw, 22px);
            background:
                radial-gradient(circle at 18% 10%, rgba(94, 234, 212, 0.35), transparent 34%),
                linear-gradient(135deg, #0f172a, #3a2e5d 58%, #7f3f36);
        }

        .page-box {
            width: min(1360px, 100%);
            height: calc(100vh - clamp(20px, 4vw, 44px));
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 20px;
            background: rgba(15, 23, 42, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(18px);
        }

        /* Top Navbar */
        nav {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 14px clamp(18px, 3vw, 30px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.13);
        }

        .brand {
            white-space: nowrap;
            font-size: 0.82rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        nav ul {
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: clamp(10px, 2.2vw, 28px);
            list-style: none;
        }

        nav a {
            white-space: nowrap;
            color: #c4d3e7;
            font-size: clamp(0.68rem, 0.95vw, 0.8rem);
            font-weight: 800;
            text-transform: uppercase;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: #5eead4;
        }

        /* Inner Scrollable Dashboard Container */
        .content-scroller {
            flex: 1 1 auto;
            overflow-y: auto;
            padding: clamp(16px, 2.7vw, 32px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            scrollbar-width: thin;
            scrollbar-color: rgba(94, 234, 212, 0.4) rgba(255, 255, 255, 0.05);
        }

        .content-scroller::-webkit-scrollbar {
            width: 6px;
        }

        .content-scroller::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .content-scroller::-webkit-scrollbar-thumb {
            background: rgba(94, 234, 212, 0.4);
            border-radius: 999px;
        }

        .content-scroller::-webkit-scrollbar-thumb:hover {
            background: #5eead4;
        }

        /* ==========================================================================
           CONTACT VIEW CARD COMPONENTS
           ========================================================================== */
        .contact-card {
            max-width: 540px;
            width: 100%;
            padding: clamp(20px, 4vw, 32px);
            border-radius: 12px;
            background: rgba(8, 13, 26, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .contact-card h1 {
            color: #f8fafc;
            font-size: clamp(1.6rem, 3.5vw, 2.2rem);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }

        .contact-card p {
            color: #c4d3e7;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        /* Internal list panel */
        .contact-details {
            display: flex;
            flex-direction: column;
            gap: 16px;
            text-align: left;
            background: rgba(15, 23, 42, 0.6);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .detail-item span.label {
            color: #fbbf24;
            font-size: 0.76rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 900;
        }

        .detail-item span.value {
            color: #e2e8f0;
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* ==========================================================================
           RESPONSIVE STRUCTURAL OVERRIDES
           ========================================================================== */
        @media (max-width: 980px) {
            .page-shell {
                height: 100vh;
            }

            .page-box {
                height: calc(100vh - 20px);
            }

            nav {
                align-items: flex-start;
                flex-direction: column;
            }

            nav ul {
                width: 100%;
                flex-wrap: wrap;
                justify-content: flex-start;
            }

            .content-scroller {
                padding: 20px 14px;
            }
        }

        @media (max-width: 520px) {
            .page-shell {
                padding: 8px;
            }

            .page-box {
                border-radius: 14px;
            }

            .content-scroller {
                padding: 16px 12px;
            }
        }
    </style>
</head>
<body>

    <div class="page-shell">
        <main class="page-box">
            
            <nav>
                <div class="brand">Seller Desk</div>
                <ul>
                    <li><a href="sellerhome.html">Home</a></li>
                    <li><a href="sellingbook.html">Sell a Book</a></li>
                    <li><a href="sellercontactus.html">Contact Us</a></li>
                    <li><a href="sellerorders.html">Orders</a></li>
                    <li><a href="sellerprofile.html">Profile</a></li>
                </ul>
            </nav>

            <div class="content-scroller">
                
                <section class="contact-card">
                    <h1>We Are Here to Help You</h1>
                    <p>Connect with us without any hesitation.</p>
                    
                    <div class="contact-details">
                        <div class="detail-item">
                            <span class="label">Phone</span>
                            <span class="value">+91 0987654321</span>
                        </div>
                        <div class="detail-item">
                            <span class="label">Email</span>
                            <span class="value">bookstore@gmail.com</span>
                        </div>
                    </div>
                </section>
                
            </div>
        </main>
    </div>

</body>
</html>
